<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS TRACKER // SYSTEM ONLINE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --neon-blue:#00d4ff;--neon-purple:#b026ff;--neon-green:#00ff88;
  --neon-red:#ff3366;--neon-orange:#ff9500;--neon-yellow:#ffe600;
  --dark:#04030f;--dark2:#080618;--surface:rgba(0,212,255,.04);
  --muted:#5a7a8a;--text:#c8e8ff;
}
html,body{height:100%;background:var(--dark);color:var(--text);
  font-family:"Exo 2",system-ui,sans-serif;overflow:hidden;cursor:crosshair}

/* BG */
#bg-img{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;
  filter:brightness(.28) saturate(1.5) hue-rotate(-10deg)}
#bg-ov{position:fixed;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(180deg,rgba(4,3,15,.7) 0%,rgba(4,3,15,.3) 50%,rgba(4,3,15,.85) 100%)}

/* SCANLINES */
#scan{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,212,255,.018) 3px,rgba(0,212,255,.018) 4px);
  animation:scanScroll 12s linear infinite}
@keyframes scanScroll{to{background-position:0 100px}}

/* VIGNETTE */
#vign{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(ellipse at 50% 50%,transparent 40%,rgba(0,0,0,.7) 100%)}

/* SCREEN FLASH */
#flash{position:fixed;inset:0;z-index:8;pointer-events:none;opacity:0}
#flash.zap{animation:zapFlash .3s ease forwards}
@keyframes zapFlash{0%{opacity:0;background:rgba(0,150,255,0)}20%{opacity:1;background:rgba(0,150,255,.3)}100%{opacity:0;background:rgba(0,150,255,0)}}
body.shake{animation:bodyShake .2s ease}
@keyframes bodyShake{0%,100%{transform:translate(0)}25%{transform:translate(-3px,2px)}75%{transform:translate(3px,-2px)}}

/* WARP */
#warp{position:fixed;inset:0;z-index:50;pointer-events:none;opacity:0}
#warp.go{animation:warpGo .5s ease forwards}
@keyframes warpGo{0%{opacity:0}40%{opacity:1;background:radial-gradient(ellipse,rgba(0,212,255,.9) 0%,rgba(4,3,15,1) 80%)}100%{opacity:0}}

/* CURSOR */
#cur{position:fixed;pointer-events:none;z-index:9998;width:24px;height:24px;
  transform:translate(-50%,-50%);transition:transform .08s}
#cur svg{width:100%;height:100%;filter:drop-shadow(0 0 4px var(--neon-blue))}
#cur.hover{transform:translate(-50%,-50%) scale(1.6)}
#cur-trail-cvs{position:fixed;inset:0;z-index:9997;pointer-events:none}

/* ── PAGES ── */
.page{position:fixed;inset:0;z-index:10;overflow-y:auto;overflow-x:hidden;
  transition:opacity .4s,transform .4s,filter .4s}
.page.hidden{opacity:0;pointer-events:none;transform:scale(1.06);filter:blur(6px)}
.page.active{opacity:1;pointer-events:all;transform:scale(1);filter:none}

/* ══ HOME ══ */
#home{display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}

/* HUD corners */
.hud-corner{position:absolute;width:80px;height:80px;z-index:20;pointer-events:none}
.hud-tl{top:12px;left:12px;border-top:2px solid var(--neon-blue);border-left:2px solid var(--neon-blue);
  box-shadow:inset 4px 4px 0 rgba(0,212,255,.08)}
.hud-tr{top:12px;right:12px;border-top:2px solid var(--neon-blue);border-right:2px solid var(--neon-blue)}
.hud-bl{bottom:12px;left:12px;border-bottom:2px solid var(--neon-blue);border-left:2px solid var(--neon-blue)}
.hud-br{bottom:12px;right:12px;border-bottom:2px solid var(--neon-blue);border-right:2px solid var(--neon-blue)}

/* System text */
.sys-top{position:absolute;top:18px;left:50%;transform:translateX(-50%);
  font-family:"Share Tech Mono",monospace;font-size:10px;letter-spacing:4px;
  color:var(--neon-blue);z-index:20;white-space:nowrap;
  text-shadow:0 0 12px var(--neon-blue);animation:sysGlow 3s ease-in-out infinite}
@keyframes sysGlow{0%,100%{opacity:.6}50%{opacity:1}}
.sys-bot{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  font-family:"Share Tech Mono",monospace;font-size:9px;letter-spacing:3px;
  color:rgba(0,212,255,.4);z-index:20;white-space:nowrap;animation:blinkBot 2.5s ease-in-out infinite}
@keyframes blinkBot{0%,100%{opacity:.3}50%{opacity:.7}}

/* MIND MAP */
#mm{position:relative;z-index:20;width:min(900px,96vw);height:min(660px,88vh)}
#mm-cvs{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

/* CENTER */
.mn-center{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:clamp(88px,11vw,118px);height:clamp(88px,11vw,118px);
  border-radius:50%;z-index:30;cursor:default;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:conic-gradient(var(--neon-blue),var(--neon-purple),var(--neon-blue),var(--neon-green),var(--neon-blue));
  animation:centerSpin 6s linear infinite,centerPulse 3s ease-in-out infinite,centerBob 5s ease-in-out infinite;
}
@keyframes centerSpin{to{filter:hue-rotate(360deg)}}
@keyframes centerPulse{
  0%,100%{box-shadow:0 0 0 2px rgba(0,212,255,.4),0 0 30px rgba(0,212,255,.6),0 0 80px rgba(0,212,255,.2)}
  50%{box-shadow:0 0 0 2px rgba(176,38,255,.5),0 0 50px rgba(176,38,255,.8),0 0 120px rgba(176,38,255,.3)}}
@keyframes centerBob{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-8px)}}
.mn-center::before{content:"";position:absolute;inset:3px;border-radius:50%;
  background:var(--dark2);border:1px solid rgba(0,212,255,.2)}
.cn-icon{font-size:clamp(20px,3vw,28px);position:relative;z-index:1;
  animation:iconSpin 4s ease-in-out infinite}
@keyframes iconSpin{0%,100%{transform:rotate(-8deg) scale(1)}50%{transform:rotate(8deg) scale(1.1)}}
.cn-txt{font-size:clamp(5px,.65vw,8px);font-weight:900;letter-spacing:4px;color:var(--neon-blue);
  text-transform:uppercase;text-align:center;font-family:"Orbitron",sans-serif;
  position:relative;z-index:1;line-height:1.5;
  text-shadow:0 0 10px var(--neon-blue)}

/* ORBIT RINGS */
.orbit{position:absolute;left:50%;top:50%;border-radius:50%;pointer-events:none;z-index:18}
.orb1{width:clamp(185px,24vw,265px);height:clamp(185px,24vw,265px);
  border:1px solid rgba(0,212,255,.2);transform:translate(-50%,-50%);
  animation:orbSpin1 22s linear infinite;
  box-shadow:0 0 8px rgba(0,212,255,.1) inset}
.orb2{width:clamp(268px,35vw,375px);height:clamp(268px,35vw,375px);
  border:1px dashed rgba(176,38,255,.18);transform:translate(-50%,-50%);
  animation:orbSpin2 35s linear infinite reverse}
.orb3{width:clamp(350px,46vw,495px);height:clamp(350px,46vw,495px);
  border:1px solid rgba(0,255,136,.1);transform:translate(-50%,-50%);
  animation:orbSpin1 55s linear infinite;border-style:dotted}
.orb4{width:clamp(432px,57vw,615px);height:clamp(432px,57vw,615px);
  border:1px solid rgba(255,149,0,.07);transform:translate(-50%,-50%);
  animation:orbSpin2 80s linear infinite}
@keyframes orbSpin1{to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes orbSpin2{to{transform:translate(-50%,-50%) rotate(-360deg)}}

/* ORBIT RIDERS */
.orider{position:absolute;border-radius:50%;top:-5px;left:calc(50% - 5px)}
.orb1 .orider{width:10px;height:10px;background:var(--neon-blue);
  box-shadow:0 0 16px var(--neon-blue),0 0 40px rgba(0,212,255,.5);
  animation:riderPulse 1.6s ease-in-out infinite}
.orb2 .orider{width:8px;height:8px;background:var(--neon-purple);top:-4px;left:calc(50% - 4px);
  box-shadow:0 0 14px var(--neon-purple);animation:riderPulse 2.2s ease-in-out infinite .5s}
.orb3 .orider{width:6px;height:6px;background:var(--neon-green);top:-3px;left:calc(50% - 3px);
  box-shadow:0 0 12px var(--neon-green);animation:riderPulse 2.8s ease-in-out infinite 1s}
@keyframes riderPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(2.2);opacity:.5}}

/* ── SECTION NODES ── */
.mn{
  position:absolute;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:crosshair;z-index:25;transform:translate(-50%,-50%);
  transition:transform .32s cubic-bezier(.34,1.5,.64,1),filter .2s;
  animation:nodeIn 1s cubic-bezier(.34,1.2,.64,1) both;
  clip-path:polygon(50% 0%,93% 25%,93% 75%,50% 100%,7% 75%,7% 25%);
}
@keyframes nodeIn{from{opacity:0;transform:translate(-50%,-50%) scale(0) rotate(90deg)}
  to{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0)}}
.mn:hover{transform:translate(-50%,-50%) scale(1.22)!important;filter:brightness(1.35) saturate(1.3)}
.mn:hover .mn-icon{animation:iconPop .35s cubic-bezier(.34,2,.64,1) forwards}
@keyframes iconPop{0%{transform:scale(1)}50%{transform:scale(1.6) rotate(15deg)}100%{transform:scale(1)}}
.mn:active{transform:translate(-50%,-50%) scale(.88)!important}
.mn-icon{font-size:clamp(16px,2.5vw,24px);pointer-events:none;transition:transform .3s;margin-bottom:2px}
.mn-lbl{font-size:clamp(5px,.72vw,8px);font-weight:900;letter-spacing:2px;
  text-transform:uppercase;color:#fff;pointer-events:none;font-family:"Orbitron",sans-serif;
  text-shadow:0 0 8px currentColor;line-height:1}
.mn-cnt{font-size:clamp(5px,.65vw,8px);opacity:.55;margin-top:2px;pointer-events:none;
  font-family:"Share Tech Mono",monospace}

/* Node size */
.mn{width:clamp(80px,10.5vw,112px);height:clamp(80px,10.5vw,112px)}

/* Positions (pentagon) */
#mn-a{top:10%;left:50%;--nc:#ff3366;--nc2:#ff9500;
  background:linear-gradient(145deg,#4a0018,#6b1800);
  box-shadow:0 0 25px rgba(255,51,102,.5),0 0 60px rgba(255,51,102,.15);
  animation:nodeIn 1s .1s cubic-bezier(.34,1.2,.64,1) both,floatA 5s ease-in-out infinite 1s}
#mn-m{top:31%;left:82%;--nc:#00d4ff;--nc2:#0066ff;
  background:linear-gradient(145deg,#001a3a,#001040);
  box-shadow:0 0 25px rgba(0,212,255,.5),0 0 60px rgba(0,212,255,.15);
  animation:nodeIn 1s .22s cubic-bezier(.34,1.2,.64,1) both,floatB 6.5s ease-in-out infinite 1s}
#mn-s{top:74%;left:69%;--nc:#00ff88;--nc2:#00cc66;
  background:linear-gradient(145deg,#001a0d,#00100a);
  box-shadow:0 0 25px rgba(0,255,136,.5),0 0 60px rgba(0,255,136,.15);
  animation:nodeIn 1s .36s cubic-bezier(.34,1.2,.64,1) both,floatC 7s ease-in-out infinite 1s}
#mn-t{top:74%;left:31%;--nc:#ffe600;--nc2:#ff9500;
  background:linear-gradient(145deg,#1a1200,#100a00);
  box-shadow:0 0 25px rgba(255,230,0,.5),0 0 60px rgba(255,230,0,.15);
  animation:nodeIn 1s .5s cubic-bezier(.34,1.2,.64,1) both,floatD 5.8s ease-in-out infinite 1s}
#mn-g{top:31%;left:18%;--nc:#b026ff;--nc2:#6600cc;
  background:linear-gradient(145deg,#1a0033,#0d001a);
  box-shadow:0 0 25px rgba(176,38,255,.5),0 0 60px rgba(176,38,255,.15);
  animation:nodeIn 1s .64s cubic-bezier(.34,1.2,.64,1) both,floatE 6.2s ease-in-out infinite 1s}

/* Hexagon border glow per node */
#mn-a{border:2px solid rgba(255,51,102,.6)}
#mn-m{border:2px solid rgba(0,212,255,.6)}
#mn-s{border:2px solid rgba(0,255,136,.6)}
#mn-t{border:2px solid rgba(255,230,0,.6)}
#mn-g{border:2px solid rgba(176,38,255,.6)}

@keyframes floatA{0%,100%{transform:translate(-50%,-50%) translateY(0)}50%{transform:translate(-50%,-50%) translateY(-11px)}}
@keyframes floatB{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-50%) translate(-9px,-9px)}}
@keyframes floatC{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-50%) translate(-8px,10px)}}
@keyframes floatD{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-50%) translate(10px,9px)}}
@keyframes floatE{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,-50%) translate(9px,-8px)}}
.mn:hover{animation:none!important}

/* Click ripple */
.nripple{position:absolute;border-radius:50%;pointer-events:none;z-index:40;
  animation:nripOut .65s ease forwards}
@keyframes nripOut{0%{border:2px solid rgba(0,212,255,.9);width:90%;height:90%;top:5%;left:5%;opacity:1}
  100%{border:1px solid rgba(0,212,255,.1);width:280%;height:280%;top:-90%;left:-90%;opacity:0}}

/* Corona */
.corona{position:absolute;left:50%;top:50%;border-radius:50%;pointer-events:none;z-index:19;
  animation:coronaOut ease-out infinite}
@keyframes coronaOut{0%{transform:translate(-50%,-50%) scale(.85);opacity:.8}
  100%{transform:translate(-50%,-50%) scale(3.4);opacity:0}}
.co1{width:clamp(88px,11vw,118px);height:clamp(88px,11vw,118px);
  border:1.5px solid rgba(0,212,255,.6);animation-duration:2.4s}
.co2{width:clamp(88px,11vw,118px);height:clamp(88px,11vw,118px);
  border:1px solid rgba(176,38,255,.5);animation-duration:2.4s;animation-delay:.8s}
.co3{width:clamp(88px,11vw,118px);height:clamp(88px,11vw,118px);
  border:1px solid rgba(0,255,136,.3);animation-duration:2.4s;animation-delay:1.6s}

/* ══ SECTION PAGES ══ */
.sp{background:rgba(4,3,15,.0)}
.sp-header{
  position:sticky;top:0;z-index:100;padding:12px 22px;
  display:flex;align-items:center;gap:12px;
  background:rgba(4,3,15,.94);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(0,212,255,.18);
  animation:hdrIn .35s cubic-bezier(.34,1.1,.64,1);
}
@keyframes hdrIn{from{transform:translateY(-100%);opacity:0}to{transform:translateY(0);opacity:1}}
/* Animated border bottom */
.sp-header::after{content:"";position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon-blue),transparent);
  animation:scanH 3s ease-in-out infinite}
@keyframes scanH{0%,100%{transform:scaleX(0);opacity:0}50%{transform:scaleX(1);opacity:1}}

.back{width:36px;height:36px;border:1px solid rgba(0,212,255,.4);background:rgba(0,212,255,.07);
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--neon-blue);
  transition:all .22s;flex-shrink:0;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)}
.back:hover{background:rgba(0,212,255,.2);transform:scale(1.18) rotate(-10deg);
  box-shadow:0 0 20px rgba(0,212,255,.4)}
.sp-icon{font-size:20px;animation:iconSpin 3s ease-in-out infinite}
.sp-title{font-size:16px;font-weight:900;color:var(--neon-blue);font-family:"Orbitron",sans-serif;
  letter-spacing:3px;text-shadow:0 0 15px var(--neon-blue);animation:titlePulse 4s ease-in-out infinite}
@keyframes titlePulse{0%,100%{text-shadow:0 0 15px var(--neon-blue)}50%{text-shadow:0 0 30px var(--neon-blue),0 0 60px rgba(0,212,255,.4)}}
.sp-sub{font-size:10px;color:var(--muted);margin-left:4px;font-family:"Share Tech Mono",monospace}
.sp-addbtn{
  margin-left:auto;padding:8px 18px;border:none;cursor:pointer;
  font-size:11px;font-weight:800;color:#000;font-family:"Orbitron",sans-serif;
  letter-spacing:1px;transition:all .22s;position:relative;overflow:hidden;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.sp-addbtn::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  transform:translateX(-100%);transition:transform .5s}
.sp-addbtn:hover::before{transform:translateX(100%)}
.sp-addbtn:hover{filter:brightness(1.25);transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.5)}
.sp-addbtn:active{transform:scale(.95)}

.sp-body{padding:18px 22px;max-width:1100px;margin:0 auto}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:18px}
.sc{
  padding:14px;background:rgba(0,212,255,.04);text-align:center;
  border:1px solid rgba(0,212,255,.15);position:relative;overflow:hidden;
  animation:scIn .45s cubic-bezier(.34,1.2,.64,1) both;transition:all .22s;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.sc::before{content:"";position:absolute;top:0;left:-100%;width:100%;height:2px;
  background:linear-gradient(90deg,transparent,var(--neon-blue),transparent);
  animation:topScan 3s ease-in-out infinite}
@keyframes topScan{0%{left:-100%}100%{left:100%}}
.sc:hover{transform:translateY(-3px) scale(1.04);border-color:rgba(0,212,255,.4);
  box-shadow:0 0 20px rgba(0,212,255,.15)}
.sc:nth-child(1){animation-delay:0ms}.sc:nth-child(2){animation-delay:70ms}
.sc:nth-child(3){animation-delay:140ms}.sc:nth-child(4){animation-delay:210ms}
@keyframes scIn{from{opacity:0;transform:translateY(16px) scaleX(.8)}to{opacity:1;transform:translateY(0) scaleX(1)}}
.sv{font-size:26px;font-weight:900;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;font-family:"Orbitron",sans-serif}
.sl{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;
  font-family:"Share Tech Mono",monospace}

/* PILLS */
.ctrl{margin-bottom:12px}.pills{display:flex;gap:6px;flex-wrap:wrap}
.fp{padding:5px 14px;border:1px solid rgba(0,212,255,.2);background:rgba(0,212,255,.04);
  cursor:pointer;font-size:9px;font-weight:700;color:rgba(0,212,255,.5);
  transition:all .2s;font-family:"Orbitron",sans-serif;letter-spacing:1px;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%)}
.fp:hover{color:var(--neon-blue);border-color:var(--neon-blue);transform:translateY(-2px);
  box-shadow:0 0 12px rgba(0,212,255,.3)}
.fp.on{color:#000;border-color:transparent;
  box-shadow:0 0 15px rgba(0,212,255,.4);font-weight:900}

/* FORM */
.fwrap{border:1px solid rgba(0,212,255,.25);background:rgba(0,20,40,.6);
  backdrop-filter:blur(18px);padding:16px;margin-bottom:14px;
  animation:formIn .28s cubic-bezier(.34,1.1,.64,1);position:relative;overflow:hidden;
  clip-path:polygon(12px 0%,100% 0%,calc(100% - 12px) 100%,0% 100%)}
.fwrap::before{content:"";position:absolute;top:0;left:-100%;width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,.05),transparent);
  animation:fwrapShimmer 4s ease-in-out infinite}
@keyframes fwrapShimmer{0%{left:-100%}100%{left:200%}}
@keyframes formIn{from{opacity:0;transform:translateX(-20px) scaleY(.9)}to{opacity:1;transform:translateX(0) scaleY(1)}}
.fg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:9px;margin-bottom:12px}
.ff label{display:block;font-size:8px;color:var(--neon-blue);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:4px;font-family:"Share Tech Mono",monospace}
.fi,.fsel{width:100%;padding:8px 12px;background:rgba(0,212,255,.06);
  border:1px solid rgba(0,212,255,.22);color:#fff;font-size:12px;
  font-family:"Exo 2",sans-serif;outline:none;transition:all .22s}
.fi:focus,.fsel:focus{border-color:var(--neon-blue);box-shadow:0 0 0 2px rgba(0,212,255,.15),0 0 20px rgba(0,212,255,.1);
  background:rgba(0,212,255,.09)}.fsel option{background:#04030f}
.fbts{display:flex;justify-content:flex-end;gap:8px}
.fbt{padding:7px 18px;cursor:pointer;font-size:10px;font-weight:800;
  font-family:"Orbitron",sans-serif;border:1px solid transparent;transition:all .22s;
  letter-spacing:1px;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%)}
.fbt.c{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.15);color:rgba(255,255,255,.4)}
.fbt.c:hover{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
.fbt:not(.c):hover{filter:brightness(1.2);transform:translateY(-2px)}.fbt:active{transform:scale(.96)}

/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(188px,1fr));gap:11px}
.card{
  background:rgba(0,20,40,.6);border:1px solid rgba(0,212,255,.14);padding:14px;
  backdrop-filter:blur(14px);animation:cardIn .38s cubic-bezier(.34,1.2,.64,1) both;
  transition:all .25s;position:relative;overflow:hidden;
  clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));
}
.card::before{content:"";position:absolute;top:0;right:0;width:14px;height:14px;
  border-bottom:1px solid rgba(0,212,255,.4);border-left:1px solid rgba(0,212,255,.4);
  background:rgba(0,212,255,.08)}
.card::after{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,.06),transparent);
  transition:left .45s ease;pointer-events:none}
.card:hover::after{left:100%}
.card:hover{border-color:rgba(0,212,255,.4);transform:translateY(-6px) scale(1.02);
  background:rgba(0,30,60,.75);box-shadow:0 12px 40px rgba(0,0,0,.6),0 0 20px rgba(0,212,255,.1)}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.88) rotateY(-8deg)}
  to{opacity:1;transform:translateY(0) scale(1) rotateY(0)}}
.card:nth-child(1){animation-delay:0ms}.card:nth-child(2){animation-delay:55ms}
.card:nth-child(3){animation-delay:110ms}.card:nth-child(4){animation-delay:165ms}
.card:nth-child(5){animation-delay:220ms}.card:nth-child(6){animation-delay:275ms}
.card:nth-child(7){animation-delay:330ms}.card:nth-child(8){animation-delay:385ms}
.card:nth-child(9){animation-delay:440ms}.card:nth-child(10){animation-delay:495ms}
.card:nth-child(11){animation-delay:550ms}.card:nth-child(12){animation-delay:605ms}
.ct{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cm{font-size:10px;color:var(--muted);margin-bottom:7px;font-family:"Share Tech Mono",monospace}
.cf{display:flex;align-items:center;justify-content:space-between;margin-top:8px;gap:4px}
.sbadge{display:inline-block;padding:2px 9px;font-size:9px;font-weight:700;letter-spacing:.8px;
  font-family:"Share Tech Mono",monospace;animation:badgeIn .35s cubic-bezier(.34,1.5,.64,1);
  clip-path:polygon(4px 0%,100% 0%,calc(100% - 4px) 100%,0% 100%)}
@keyframes badgeIn{from{transform:scale(0) scaleX(0)}to{transform:scale(1) scaleX(1)}}
.stars{font-size:11px;margin-bottom:4px;letter-spacing:2px}
.qs{font-size:9px;background:transparent;border:none;color:var(--muted);cursor:pointer;
  outline:none;font-family:"Share Tech Mono",monospace;max-width:76px;transition:color .2s}
.qs:hover{color:var(--neon-blue)}.qs option{background:#04030f;color:#fff}
.del{background:none;border:none;cursor:pointer;color:rgba(255,51,102,.3);font-size:20px;
  line-height:1;padding:2px;transition:all .22s}
.del:hover{color:var(--neon-red);transform:scale(1.3) rotate(20deg);
  text-shadow:0 0 10px var(--neon-red)}
.pt{height:4px;background:rgba(0,212,255,.08);margin:5px 0;position:relative;overflow:hidden}
.pt::after{content:"";position:absolute;inset:0;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,.15),transparent);
  animation:barShimmer 1.8s ease-in-out infinite}
@keyframes barShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.pb{height:100%;transition:width .65s cubic-bezier(.34,1.2,.64,1);position:relative;z-index:1}
.pl{font-size:8px;color:var(--muted);margin-bottom:2px;font-family:"Share Tech Mono",monospace}
.empty{text-align:center;padding:3rem;color:rgba(0,212,255,.2);font-size:13px;
  font-family:"Share Tech Mono",monospace;animation:emptyPulse 2s ease-in-out infinite}
@keyframes emptyPulse{0%,100%{opacity:.4}50%{opacity:1}}

/* TIMETABLE */
.dnav{display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:3px}
.db{padding:7px 14px;border:1px solid rgba(0,212,255,.18);background:rgba(0,212,255,.04);
  cursor:pointer;font-size:9px;font-weight:700;color:rgba(0,212,255,.35);
  font-family:"Orbitron",sans-serif;transition:all .2s;white-space:nowrap;letter-spacing:1px;
  clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%)}
.db:hover{border-color:rgba(0,212,255,.5);color:var(--neon-blue);transform:translateY(-2px)}.db.on{color:#000;border-color:transparent}
.slist{display:flex;flex-direction:column;gap:7px}
.slot{display:flex;align-items:center;gap:11px;padding:11px 14px;
  background:rgba(0,20,40,.6);border:1px solid rgba(0,212,255,.12);
  backdrop-filter:blur(12px);animation:slotIn .3s cubic-bezier(.34,1.1,.64,1) both;
  transition:all .22s;position:relative;overflow:hidden;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%)}
.slot::before{content:"";position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--sc,var(--neon-blue));opacity:.8;transition:width .3s}
.slot:hover::before{width:4px;opacity:1}
.slot:hover{border-color:rgba(0,212,255,.3);transform:translateX(6px);
  background:rgba(0,30,60,.7)}
@keyframes slotIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
.slot:nth-child(1){animation-delay:0ms}.slot:nth-child(2){animation-delay:55ms}
.slot:nth-child(3){animation-delay:110ms}.slot:nth-child(4){animation-delay:165ms}
.slot:nth-child(5){animation-delay:220ms}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;animation:sdotPulse 2s ease-in-out infinite}
@keyframes sdotPulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 currentColor}50%{transform:scale(1.4);box-shadow:0 0 8px 2px rgba(0,0,0,0)}}
.stm{font-size:11px;font-weight:700;color:var(--muted);min-width:75px;
  font-family:"Orbitron",sans-serif;font-size:10px}
.stk{flex:1;font-size:12px;color:#fff}
.sdel{background:none;border:none;cursor:pointer;color:rgba(255,51,102,.25);font-size:19px;transition:all .22s}
.sdel:hover{color:var(--neon-red);transform:scale(1.3)}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,212,255,.2);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,212,255,.4)}
</style>

resizeCur();window.addEventListener('resize',resizeCur);
document.addEventListener('mousemove',function(e){
  cmx=e.clientX;cmy=e.clientY;
  cur.style.left=cmx+'px';cur.style.top=cmy+'px';
  ctrail.push({x:cmx,y:cmy,a:1});

  cur.className=h&&(h.classList.contains('mn')||h.classList.contains('sp-addbtn')||h.classList.contains('fp')||h.classList.contains('fbt')||h.classList.contains('back')||h.classList.contains('db'))?'hover':'';
});
(function curTrailLoop(){
  curCtx.clearRect(0,0,curTCvs.width,curTCvs.height);
  ctrail=ctrail.filter(function(p){return p.a>0.02});
  ctrail.forEach(function(p,i){
    p.a-=0.06;
    if(p.a<=0)return;
    var g=curCtx.createRadialGradient(p.x,p.y,0,p.x,p.y,5);
    g.addColorStop(0,'rgba(0,212,255,'+p.a*.7+')');
    g.addColorStop(1,'rgba(0,212,255,0)');
    curCtx.beginPath();curCtx.arc(p.x,p.y,5,0,Math.PI*2);
    curCtx.fillStyle=g;curCtx.fill();
  });
  requestAnimationFrame(curTrailLoop);
})();

/* ── CANVAS ENGINE ── */
(function(){
  var cvs=document.getElementById('mm-cvs'),ctx=cvs.getContext('2d');
  var mm=document.getElementById('mm');
  var DEFS=[
    {id:'mn-g',c1:'#b026ff',c2:'#6600cc'},
    {id:'mn-m',c1:'#00d4ff',c2:'#0066ff'},
    {id:'mn-a',c1:'#ff3366',c2:'#ff9500'},
    {id:'mn-s',c1:'#00ff88',c2:'#00cc66'},
    {id:'mn-t',c1:'#ffe600',c2:'#ff9500'}
  ];
  var nodes={},dots=[],rings=[],sparks=[],bolts=[],stars2=[];
  var mouseX=0,mouseY=0,gT=0,dt=0,prev=0;
  for(var i=0;i<180;i++) stars2.push({x:Math.random()*2400,y:Math.random()*1400,r:Math.random()*1.5+.2,ph:Math.random()*Math.PI*2,sp:Math.random()*.03+.008});

  function getPos(el){var mr=mm.getBoundingClientRect(),er=el.getBoundingClientRect();return{x:er.left-mr.left+er.width/2,y:er.top-mr.top+er.height/2,r:er.width/2}}
  function rebuild(){cvs.width=mm.offsetWidth;cvs.height=mm.offsetHeight;
    var cEl=document.querySelector('.mn-center');if(cEl)nodes.center=getPos(cEl);
    DEFS.forEach(function(d){var el=document.getElementById(d.id);if(el)nodes[d.id]=Object.assign({},getPos(el),{c1:d.c1,c2:d.c2})})}
  window.addEventListener('resize',function(){setTimeout(rebuild,60)});
  mm.addEventListener('mousemove',function(e){var r=mm.getBoundingClientRect();mouseX=e.clientX-r.left;mouseY=e.clientY-r.top});
  setTimeout(rebuild,160);
  function isHome(){return document.getElementById('home').classList.contains('active')}

  function flash(){
    var fl=document.getElementById('flash');fl.className='';void fl.offsetWidth;fl.className='zap';
    document.body.classList.remove('shake');void document.body.offsetWidth;document.body.classList.add('shake');
    setTimeout(function(){document.body.classList.remove('shake')},250);
  }
  function makePath(x1,y1,x2,y2,segs,spread){
    var pts=[{x:x1,y:y1}];
    for(var i=1;i<segs;i++){var t=i/segs;pts.push({x:x1+(x2-x1)*t+(Math.random()-.5)*spread,y:y1+(y2-y1)*t+(Math.random()-.5)*spread});}
    pts.push({x:x2,y:y2});return pts;
  }
  function spawnBolt(ak,bk,big){
    var a=nodes[ak],b=nodes[bk];if(!a||!b)return;
    var main=makePath(a.x,a.y,b.x,b.y,18,big?45:28);
    var branches=[];
    for(var br=0;br<(big?5:3);br++){
      var bi=2+Math.floor(Math.random()*(main.length-4)),bp=main[bi];
      var bAng=Math.atan2(b.y-a.y,b.x-a.x)+(Math.random()-.5)*2;
      var bLen=25+Math.random()*(big?60:35);
      branches.push(makePath(bp.x,bp.y,bp.x+Math.cos(bAng)*bLen,bp.y+Math.sin(bAng)*bLen,5,12));
    }
    bolts.push({main:main,branches:branches,c1:a.c1,c2:b.c1,t:0,dur:big?.55:.4,w:big?4:2.5});
    [a,b].forEach(function(n){
      for(var sp=0;sp<(big?22:12);sp++){
        var ang=Math.random()*Math.PI*2,spd=2+Math.random()*(big?6:4);
        sparks.push({x:n.x,y:n.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,c:Math.random()>.5?a.c1:b.c1,t:0,dur:.8+Math.random()*.4,r:2+Math.random()*3});
      }
    });
    if(big) flash();
  }
  function chainLightning(){
    if(!isHome())return;
    var keys=DEFS.map(function(d){return d.id}).sort(function(){return Math.random()-.5});
    spawnBolt(keys[0],keys[1],true);
    setTimeout(function(){if(isHome())spawnBolt(keys[1],keys[2],false)},130);
    setTimeout(function(){if(isHome())spawnBolt(keys[2],'center',false)},260);
  }
  function centerBurst(){
    if(!isHome())return;
    DEFS.forEach(function(d,i){setTimeout(function(){if(isHome())spawnBolt('center',d.id,true)},i*90)});
    flash();
  }
  function ambientBolt(){
    if(!isHome())return;
    var keys=Object.keys(nodes),ak=keys[Math.floor(Math.random()*keys.length)],bk=keys[Math.floor(Math.random()*keys.length)];
    if(ak!==bk)spawnBolt(ak,bk,false);
  }
  function spawnDot(){
    if(!isHome())return;
    var nkeys=DEFS.map(function(d){return d.id}),nk=nkeys[Math.floor(Math.random()*nkeys.length)];
    var n=nodes[nk],c=nodes.center;if(!n||!c)return;
    var fromC=Math.random()>.4;
    dots.push({sx:fromC?c.x:n.x,sy:fromC?c.y:n.y,tx:fromC?n.x:c.x,ty:fromC?n.y:c.y,
      toNode:fromC,nk:nk,c1:n.c1,c2:n.c2,p:0,dur:1.2+Math.random()*.9,trail:[],fired:false,size:3+Math.random()*2.5});
  }
  function spawnRings(nk){
    var n=nodes[nk];if(!n)return;
    for(var i=0;i<7;i++) rings.push({x:n.x,y:n.y,r:n.r*.3,maxR:n.r*4.5,c1:n.c1,c2:n.c2,t:0,delay:i*.09,dur:.85});
    for(var j=0;j<14;j++){var ang=Math.random()*Math.PI*2,spd=1.5+Math.random()*4;sparks.push({x:n.x,y:n.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,c:Math.random()>.5?n.c1:n.c2,t:0,dur:.8+Math.random()*.4,r:2+Math.random()*2.5})}
  }

  setInterval(spawnDot,400);
  setInterval(ambientBolt,1600);
  setInterval(chainLightning,5000);
  setInterval(centerBurst,9500);

  function draw(ts){
    dt=Math.min((ts-prev)/1000,.055);prev=ts;gT+=dt;
    ctx.clearRect(0,0,cvs.width,cvs.height);
    if(!isHome()){requestAnimationFrame(draw);return}
    var c=nodes.center;if(!c){requestAnimationFrame(draw);return}
    var W=cvs.width,H=cvs.height;

    /* STARS */
    stars2.forEach(function(s){
      var a=.1+.5*(.5+.5*Math.sin(gT*s.sp*3+s.ph));
      ctx.beginPath();ctx.arc(s.x%W,s.y%H,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(180,230,255,'+a+')';ctx.fill();
    });

    /* GRID LINES (gamer HUD) */
    ctx.globalAlpha=.03;
    ctx.strokeStyle='#00d4ff';ctx.lineWidth=.5;
    var gridSize=40;
    for(var gx=0;gx<W;gx+=gridSize){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke()}
    for(var gy=0;gy<H;gy+=gridSize){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke()}
    ctx.globalAlpha=1;

    /* WAVE LINES */
    DEFS.forEach(function(d){
      var n=nodes[d.id];if(!n)return;
      var gr=ctx.createLinearGradient(c.x,c.y,n.x,n.y);
      gr.addColorStop(0,d.c1+'99');gr.addColorStop(1,d.c2+'99');
      var mx2=(c.x+n.x)/2,my2=(c.y+n.y)/2;
      var len=Math.sqrt((n.x-c.x)**2+(n.y-c.y)**2);
      var nx2=-(n.y-c.y)/len,ny2=(n.x-c.x)/len;
      var wave=Math.sin(gT*2)*14;
      ctx.beginPath();ctx.moveTo(c.x,c.y);ctx.quadraticCurveTo(mx2+nx2*wave,my2+ny2*wave,n.x,n.y);
      ctx.strokeStyle=gr;ctx.lineWidth=2.2;ctx.globalAlpha=1;ctx.stroke();
      /* dashed secondary */
      ctx.setLineDash([4,8]);ctx.lineWidth=.8;ctx.globalAlpha=.25;
      ctx.beginPath();ctx.moveTo(c.x,c.y);ctx.quadraticCurveTo(mx2-nx2*wave*.6,my2-ny2*wave*.6,n.x,n.y);
      ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;
    });

    /* LIGHTNING BOLTS */
    bolts=bolts.filter(function(b){return b.t<b.dur});
    bolts.forEach(function(bolt){
      bolt.t+=dt;var p=bolt.t/bolt.dur,al=(1-p)*.95;
      /* 3-pass render */
      [{w:bolt.w*4,a:.25,c:bolt.c1},{w:bolt.w,a:.9,c:'rgba(200,240,255,1)'},{w:.6,a:1,c:'#fff'}].forEach(function(ps){
        ctx.beginPath();ctx.moveTo(bolt.main[0].x,bolt.main[0].y);
        for(var i=1;i<bolt.main.length;i++)ctx.lineTo(bolt.main[i].x,bolt.main[i].y);
        ctx.strokeStyle=ps.c;ctx.lineWidth=ps.w;ctx.globalAlpha=al*ps.a;
        ctx.shadowBlur=ps.w*8;ctx.shadowColor=bolt.c1;ctx.stroke();
      });
      bolt.branches.forEach(function(bpts){
        ctx.beginPath();ctx.moveTo(bpts[0].x,bpts[0].y);
        for(var i=1;i<bpts.length;i++)ctx.lineTo(bpts[i].x,bpts[i].y);
        ctx.strokeStyle=bolt.c2;ctx.lineWidth=bolt.w*.5;ctx.globalAlpha=al*.6;
        ctx.shadowBlur=10;ctx.shadowColor=bolt.c2;ctx.stroke();
      });
      ctx.shadowBlur=0;ctx.globalAlpha=1;
    });

    /* RINGS */
    rings=rings.filter(function(r){return r.t<r.dur+r.delay});
    rings.forEach(function(r){
      r.t+=dt;var eff=r.t-r.delay;if(eff<0)return;
      var p=Math.min(eff/r.dur,1),cr=r.r+(r.maxR-r.r)*p,al=(1-p)*.9;
      ctx.beginPath();ctx.arc(r.x,r.y,cr,0,Math.PI*2);
      ctx.strokeStyle=p<.5?r.c1:r.c2;ctx.lineWidth=4*(1-p)+.3;
      ctx.globalAlpha=al;ctx.shadowBlur=20;ctx.shadowColor=r.c1;ctx.stroke();
      ctx.shadowBlur=0;
      if(p<.22){ctx.beginPath();ctx.arc(r.x,r.y,cr*.4,0,Math.PI*2);ctx.fillStyle=r.c1;ctx.globalAlpha=(1-p/.22)*.2;ctx.fill()}
      ctx.globalAlpha=1;
    });

    /* SPARKS */
    sparks=sparks.filter(function(s){return s.t<s.dur});
    sparks.forEach(function(s){
      s.t+=dt;s.x+=s.vx;s.y+=s.vy;s.vy+=.1;s.vx*=.97;
      var p=s.t/s.dur,al=1-p;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r*(1-p*.6),0,Math.PI*2);
      ctx.fillStyle=s.c;ctx.globalAlpha=al*.9;ctx.fill();ctx.globalAlpha=1;
    });

    /* DOTS */
    dots=dots.filter(function(d){return d.p<=1.05});
    dots.forEach(function(d){
      d.p+=dt/d.dur;
      if(d.p>=1&&!d.fired){d.fired=true;if(d.toNode)spawnRings(d.nk)}
      var p=Math.min(d.p,1),ep=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
      var cx=d.sx+(d.tx-d.sx)*ep,cy=d.sy+(d.ty-d.sy)*ep;
      d.trail.push({x:cx,y:cy});if(d.trail.length>24)d.trail.shift();
      for(var i=1;i<d.trail.length;i++){
        var ta=i/d.trail.length;
        ctx.beginPath();ctx.moveTo(d.trail[i-1].x,d.trail[i-1].y);ctx.lineTo(d.trail[i].x,d.trail[i].y);
        ctx.strokeStyle=d.c1;ctx.lineWidth=d.size*ta*.8;ctx.globalAlpha=ta*.65;ctx.stroke();
      }
      ctx.globalAlpha=1;
      var halo=ctx.createRadialGradient(cx,cy,0,cx,cy,16);
      halo.addColorStop(0,d.c1+'dd');halo.addColorStop(1,d.c1+'00');
      ctx.beginPath();ctx.arc(cx,cy,16,0,Math.PI*2);ctx.fillStyle=halo;ctx.globalAlpha=.55;ctx.fill();
      ctx.beginPath();ctx.arc(cx,cy,d.size,0,Math.PI*2);
      var cg=ctx.createLinearGradient(cx-d.size,cy-d.size,cx+d.size,cy+d.size);
      cg.addColorStop(0,'#fff');cg.addColorStop(.5,d.c1);cg.addColorStop(1,d.c2);
      ctx.fillStyle=cg;ctx.globalAlpha=1;ctx.fill();
    });

    /* MOUSE PROXIMITY GLOW */
    DEFS.forEach(function(d){
      var n=nodes[d.id];if(!n)return;
      var dx=mouseX-n.x,dy=mouseY-n.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<160){
        var al=(1-dist/160)*.7;
        var gr=ctx.createRadialGradient(n.x,n.y,n.r,n.x,n.y,n.r*2.8);
        gr.addColorStop(0,d.c1+Math.floor(al*180).toString(16).padStart(2,'0'));
        gr.addColorStop(1,d.c2+'00');
        ctx.beginPath();ctx.arc(n.x,n.y,n.r*2.8,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
      }
    });

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

/* ── APP DATA ── */
var S={games:[],movies:[],anime:[],series:[],tt:{Mon:[],Tue:[],Wed:[],Thu:[],Fri:[],Sat:[],Sun:[]}};
var UI={tab:'home',gf:'all',mf:'all',af:'all',sf:'all',day:'Mon',form:{games:0,movies:0,anime:0,series:0,timetable:0}};
var DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function save(){try{localStorage.setItem('nxtrk1',JSON.stringify(S))}catch(e){}}
function load(){try{var d=localStorage.getItem('nxtrk1');if(d){var p=JSON.parse(d);S.games=p.games||[];S.movies=p.movies||[];S.anime=p.anime||[];S.series=p.series||[];if(p.tt)DAYS.forEach(function(k){S.tt[k]=p.tt[k]||[]})}}catch(e){}updateCounts()}
function rp(el){var r=document.createElement('div');r.className='nripple';el.appendChild(r);setTimeout(function(){r.remove()},700)}
function warpTo(sec){var w=document.getElementById('warp');w.className='go';setTimeout(function(){goTo(sec)},260);setTimeout(function(){w.className=''},600)}
function warpHome(){var w=document.getElementById('warp');w.className='go';setTimeout(function(){goHome()},260);setTimeout(function(){w.className=''},600)}
function goTo(sec){['home','games-page','movies-page','anime-page','series-page','timetable-page'].forEach(function(id){document.getElementById(id).className='page'+(id===sec+'-page'?' active':' hidden')});UI.tab=sec;UI.form={games:0,movies:0,anime:0,series:0,timetable:0};render(sec)}
function goHome(){['games-page','movies-page','anime-page','series-page','timetable-page'].forEach(function(id){document.getElementById(id).className='page hidden'});document.getElementById('home').className='page active';UI.tab='home';updateCounts()}
function updateCounts(){
  var t=0;DAYS.forEach(function(d){t+=(S.tt[d]||[]).length});
  document.getElementById('c-g').textContent=S.games.length+' TITLES';
  document.getElementById('c-m').textContent=S.movies.length+' FILMS';
  document.getElementById('c-a').textContent=S.anime.length+' SHOWS';
  document.getElementById('c-s').textContent=S.series.length+' SHOWS';
  document.getElementById('c-t').textContent=t+' SLOTS';
}
function tf(sec){UI.form[sec]=!UI.form[sec];render(sec)}
function render(sec){if(sec==='games')rG();else if(sec==='movies')rM();else if(sec==='anime')rA();else if(sec==='series')rS();else rT()}
function val(id){var el=document.getElementById(id);return el?el.value.trim():''}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function badge(s){
  var m={playing:['rgba(176,38,255,.2)','#b026ff'],completed:['rgba(0,255,136,.2)','#00ff88'],
    wishlist:['rgba(255,230,0,.2)','#ffe600'],watching:['rgba(0,212,255,.2)','#00d4ff'],
    watched:['rgba(0,255,136,.2)','#00ff88'],watchlist:['rgba(255,230,0,.2)','#ffe600'],
    planned:['rgba(255,230,0,.2)','#ffe600']};
  var c=m[s]||m.watching,l=s==='planned'?'PLANNED':s.toUpperCase();
  return'<span class="sbadge" style="background:'+c[0]+';color:'+c[1]+'">'+l+'</span>'
}
function stars(n){if(!n)return'';var h='<div class="stars">';for(var i=1;i<=5;i++)h+='<span style="color:'+(i<=n?'#ffe600':'rgba(255,230,0,.15)')+'">★</span>';return h+'</div>'}
function ft(t){if(!t)return'';var p=t.split(':'),h=parseInt(p[0]),m=p[1],ap=h>=12?'PM':'AM';h=h%12||12;return h+':'+m+' '+ap}
function sc(v,l,g){return'<div class="sc"><div class="sv" style="background:'+g+';-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">'+v+'</div><div class="sl">'+l+'</div></div>'}
function cs(type,id,v){var it=S[type].find(function(x){return x.id===id});if(it){it.status=v;save();render(type)}}
function di(type,id){S[type]=S[type].filter(function(x){return x.id!==id});save();render(type)}
function sf(t,v){var m={g:'games',m:'movies',a:'anime',s:'series'};if(t==='g')UI.gf=v;else if(t==='m')UI.mf=v;else if(t==='a')UI.af=v;else UI.sf=v;UI.form[m[t]]=0;render(m[t])}
function buildForm(sec,name,grad,cc,fields){
  var h='<div class="fwrap"><div class="fg">';
  fields.forEach(function(f){if(f.opts){h+='<div class="ff"><label>'+f.lbl+'</label><select class="fsel" id="'+f.id+'">'+f.opts.map(function(o){return'<option value="'+o[0]+'">'+o[1]+'</option>'}).join('')+'</select></div>'}else{h+='<div class="ff"><label>'+f.lbl+'</label><input class="fi" id="'+f.id+'" type="'+(f.type||'text')+'" placeholder="'+(f.ph||'')+'"></div>'}});
  h+='</div><div class="fbts"><button class="fbt c" onclick="tf(\''+sec+'\')">[ CANCEL ]</button><button class="fbt" style="background:'+grad+';color:'+cc+'" onclick="a'+name+'()">[ ADD ]</button></div></div>';return h}
function buildPills(keys,cnt,active,t,grad,labels){
  labels=labels||{};
  return keys.map(function(x){var on=active===x,lbl=labels[x]||(x==='all'?'ALL':x.toUpperCase());
    return'<button class="fp'+(on?' on':'')+'" style="'+(on?'background:'+grad+';color:#000;':'')+'" onclick="sf(\''+t+'\',\''+x+'\')">'+lbl+'<span style="opacity:.55"> ['+cnt[x]+']</span></button>'}).join('')}
function card(title,meta,extra,rating,status,qs,type,id){
  return'<div class="card"><div class="ct" title="'+esc(title)+'">'+esc(title)+'</div><div class="cm">'+esc(meta)+'</div>'+extra+stars(rating)+'<div class="cf">'+badge(status)+qs+'<button class="del" onclick="di(\''+type+'\',\''+id+'\')">×</button></div></div>'}
function prog(w,total,grad){if(!total)return'';var pct=Math.round(w/total*100);return'<div class="pt"><div class="pb" style="width:'+pct+'%;background:'+grad+'"></div></div><div class="pl">'+w+'/'+total+' EPS // '+pct+'%</div>'}
function qsel(type,id,status,opts){return'<select class="qs" onchange="cs(\''+type+'\',\''+id+'\',this.value)">'+opts.map(function(o){return'<option value="'+o[0]+'"'+(status===o[0]?' selected':'')+'>'+o[1]+'</option>'}).join('')+'</select>'}

function rG(){var all=S.games,f=UI.gf==='all'?all:all.filter(function(g){return g.status===UI.gf});var cnt={all:all.length,playing:0,completed:0,wishlist:0};all.forEach(function(g){cnt[g.status]++});document.getElementById('g-sub').textContent='// '+all.length+' LOADED';var G='linear-gradient(135deg,#b026ff,#ec4899)';document.getElementById('g-stats').innerHTML=sc(cnt.all,'TOTAL',G)+sc(cnt.playing,'PLAYING',G)+sc(cnt.completed,'DONE',G)+sc(cnt.wishlist,'WISHLIST',G);document.getElementById('g-form').innerHTML=UI.form.games?buildForm('games','Game',G,'#fff',[{id:'ft',lbl:'TITLE',ph:'Game name'},{id:'fg',lbl:'GENRE',ph:'RPG / FPS / RTS'},{id:'fs',lbl:'STATUS',opts:[['playing','Playing'],['completed','Completed'],['wishlist','Wishlist']]},{id:'fr',lbl:'RATING [1-5]',ph:'5',type:'number'}]):'';document.getElementById('g-pills').innerHTML=buildPills(['all','playing','completed','wishlist'],cnt,UI.gf,'g',G);document.getElementById('g-cards').innerHTML=f.length===0?'<div class="empty">// NO DATA FOUND — ADD ENTRY</div>':f.map(function(g){return card(g.title,g.genre||'NO GENRE','',g.rating,g.status,qsel('games',g.id,g.status,[['playing','Playing'],['completed','Done'],['wishlist','Wish']]),'games',g.id)}).join('')}
function aGame(){var t=val('ft');if(!t)return;S.games.push({id:uid(),title:t,genre:val('fg'),status:val('fs'),rating:parseInt(val('fr'))||0});UI.form.games=0;save();rG()}

function rM(){var all=S.movies,f=UI.mf==='all'?all:all.filter(function(m){return m.status===UI.mf});var cnt={all:all.length,watched:0,watchlist:0};all.forEach(function(m){cnt[m.status]++});document.getElementById('m-sub').textContent='// '+all.length+' LOADED';var G='linear-gradient(135deg,#0044ff,#00d4ff)';document.getElementById('m-stats').innerHTML=sc(cnt.all,'TOTAL',G)+sc(cnt.watched,'WATCHED',G)+sc(cnt.watchlist,'WATCHLIST',G);document.getElementById('m-form').innerHTML=UI.form.movies?buildForm('movies','Movie',G,'#000',[{id:'ft',lbl:'TITLE',ph:'Movie title'},{id:'fy',lbl:'YEAR',ph:'2024',type:'number'},{id:'fg',lbl:'GENRE',ph:'Action / Drama'},{id:'fs',lbl:'STATUS',opts:[['watchlist','Watchlist'],['watched','Watched']]},{id:'fr',lbl:'RATING [1-5]',ph:'5',type:'number'}]):'';document.getElementById('m-pills').innerHTML=buildPills(['all','watched','watchlist'],cnt,UI.mf,'m',G);document.getElementById('m-cards').innerHTML=f.length===0?'<div class="empty">// NO DATA FOUND — ADD ENTRY</div>':f.map(function(m){return card(m.title,[m.genre,m.year].filter(Boolean).join(' // ')||'NO GENRE','',m.rating,m.status,qsel('movies',m.id,m.status,[['watched','Watched'],['watchlist','Watchlist']]),'movies',m.id)}).join('')}
function aMovie(){var t=val('ft');if(!t)return;S.movies.push({id:uid(),title:t,year:val('fy'),genre:val('fg'),status:val('fs'),rating:parseInt(val('fr'))||0});UI.form.movies=0;save();rM()}

function rA(){var all=S.anime,f=UI.af==='all'?all:all.filter(function(a){return a.status===UI.af});var cnt={all:all.length,watching:0,completed:0,planned:0};all.forEach(function(a){cnt[a.status]++});document.getElementById('a-sub').textContent='// '+all.length+' LOADED';var G='linear-gradient(135deg,#ff3366,#ff9500)';document.getElementById('a-stats').innerHTML=sc(cnt.all,'TOTAL',G)+sc(cnt.watching,'WATCHING',G)+sc(cnt.completed,'DONE',G)+sc(cnt.planned,'PLANNED',G);document.getElementById('a-form').innerHTML=UI.form.anime?buildForm('anime','Anime',G,'#000',[{id:'ft',lbl:'TITLE',ph:'Anime name'},{id:'fg',lbl:'GENRE',ph:'Shonen / Isekai'},{id:'few',lbl:'EPS WATCHED',ph:'0',type:'number'},{id:'fet',lbl:'TOTAL EPS',ph:'24',type:'number'},{id:'fs',lbl:'STATUS',opts:[['watching','Watching'],['completed','Completed'],['planned','Planned']]},{id:'fr',lbl:'RATING [1-5]',ph:'5',type:'number'}]):'';document.getElementById('a-pills').innerHTML=buildPills(['all','watching','completed','planned'],cnt,UI.af,'a',G,{planned:'PLANNED'});document.getElementById('a-cards').innerHTML=f.length===0?'<div class="empty">// NO DATA FOUND — ADD ENTRY</div>':f.map(function(a){return card(a.title,a.genre||'NO GENRE',prog(a.epW,a.epT,'linear-gradient(90deg,#ff3366,#ff9500)'),a.rating,a.status,qsel('anime',a.id,a.status,[['watching','Watching'],['completed','Done'],['planned','Plan']]),'anime',a.id)}).join('')}
function aAnime(){var t=val('ft');if(!t)return;S.anime.push({id:uid(),title:t,genre:val('fg'),epW:parseInt(val('few'))||0,epT:parseInt(val('fet'))||0,status:val('fs'),rating:parseInt(val('fr'))||0});UI.form.anime=0;save();rA()}

function rS(){var all=S.series,f=UI.sf==='all'?all:all.filter(function(s){return s.status===UI.sf});var cnt={all:all.length,watching:0,completed:0,watchlist:0};all.forEach(function(s){cnt[s.status]++});document.getElementById('s-sub').textContent='// '+all.length+' LOADED';var G='linear-gradient(135deg,#00aa44,#00ff88)';document.getElementById('s-stats').innerHTML=sc(cnt.all,'TOTAL',G)+sc(cnt.watching,'WATCHING',G)+sc(cnt.completed,'DONE',G)+sc(cnt.watchlist,'WATCHLIST',G);document.getElementById('s-form').innerHTML=UI.form.series?buildForm('series','Series',G,'#000',[{id:'ft',lbl:'TITLE',ph:'Series name'},{id:'fg',lbl:'GENRE',ph:'Thriller / Sci-Fi'},{id:'few',lbl:'EPS WATCHED',ph:'0',type:'number'},{id:'fet',lbl:'TOTAL EPS',ph:'10',type:'number'},{id:'fs',lbl:'STATUS',opts:[['watching','Watching'],['completed','Completed'],['watchlist','Watchlist']]},{id:'fr',lbl:'RATING [1-5]',ph:'5',type:'number'}]):'';document.getElementById('s-pills').innerHTML=buildPills(['all','watching','completed','watchlist'],cnt,UI.sf,'s',G);document.getElementById('s-cards').innerHTML=f.length===0?'<div class="empty">// NO DATA FOUND — ADD ENTRY</div>':f.map(function(s){return card(s.title,s.genre||'NO GENRE',prog(s.epW,s.epT,'linear-gradient(90deg,#00aa44,#00ff88)'),s.rating,s.status,qsel('series',s.id,s.status,[['watching','Watching'],['completed','Done'],['watchlist','Watchlist']]),'series',s.id)}).join('')}
function aSeries(){var t=val('ft');if(!t)return;S.series.push({id:uid(),title:t,genre:val('fg'),epW:parseInt(val('few'))||0,epT:parseInt(val('fet'))||0,status:val('fs'),rating:parseInt(val('fr'))||0});UI.form.series=0;save();rS()}

function rT(){var total=0;DAYS.forEach(function(d){total+=(S.tt[d]||[]).length});var dc=(S.tt[UI.day]||[]).length,du=DAYS.filter(function(d){return (S.tt[d]||[]).length>0}).length;document.getElementById('t-sub').textContent='// '+total+' SLOTS';var G='linear-gradient(135deg,#aa6600,#ffe600)';document.getElementById('t-stats').innerHTML=sc(total,'TOTAL',G)+sc(dc,UI.day+' SLOTS',G)+sc(du,'DAYS ACTIVE',G);document.getElementById('t-form').innerHTML=UI.form.timetable?'<div class="fwrap"><div class="fg"><div class="ff"><label>TIME</label><input class="fi" id="ftime" type="time"></div><div class="ff"><label>COLOR TAG</label><select class="fsel" id="fcol"><option value="#00d4ff">CYAN</option><option value="#b026ff">PURPLE</option><option value="#00ff88">GREEN</option><option value="#ffe600">YELLOW</option><option value="#ff3366">RED</option><option value="#ff9500">ORANGE</option><option value="#fff">WHITE</option></select></div><div class="ff" style="grid-column:1/-1"><label>TASK / MISSION</label><input class="fi" id="ftask" placeholder="Study / Training / Rest / Combat..."></div></div><div class="fbts"><button class="fbt c" onclick="tf(\'timetable\')">[CANCEL]</button><button class="fbt" style="background:linear-gradient(135deg,#aa6600,#ffe600);color:#000" onclick="aSlot()">[ADD SLOT]</button></div></div>':'';document.getElementById('t-days').innerHTML=DAYS.map(function(d){var on=UI.day===d,c=(S.tt[d]||[]).length;return'<button class="db'+(on?' on':'')+'" style="'+(on?'background:linear-gradient(135deg,#aa6600,#ffe600);color:#000;':'')+'" onclick="setDay(\''+d+'\')">'+d+(c?' ['+c+']':'')+'</button>'}).join('');var slots=(S.tt[UI.day]||[]).slice().sort(function(a,b){return a.time.localeCompare(b.time)});document.getElementById('t-slots').innerHTML=slots.length===0?'<div class="empty">// NO MISSIONS FOR '+UI.day+'</div>':'<div class="slist">'+slots.map(function(s){return'<div class="slot" style="--sc:'+s.color+'"><div class="sdot" style="background:'+s.color+';color:'+s.color+';box-shadow:0 0 8px '+s.color+'"></div><div class="stm">'+ft(s.time)+'</div><div class="stk">'+esc(s.task)+'</div><button class="sdel" onclick="ds(\''+s.id+'\')">×</button></div>'}).join('')+'</div>'}
function aSlot(){var ti=val('ftime'),ta=val('ftask');if(!ti||!ta)return;if(!S.tt[UI.day])S.tt[UI.day]=[];S.tt[UI.day].push({id:uid(),time:ti,task:ta,color:val('fcol')});UI.form.timetable=0;save();rT()}
function ds(id){S.tt[UI.day]=(S.tt[UI.day]||[]).filter(function(s){return s.id!==id});save();rT()}
function setDay(d){UI.day=d;UI.form.timetable=0;rT()}

load();
</script>
